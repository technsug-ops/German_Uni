<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 48" width="260" height="48" role="img" aria-label="ApplyToGerman">
  <defs>
    <linearGradient id="atgBadge" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#000000"/>
      <stop offset="0.5" stop-color="#dc2626"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <!-- Germany flag stripes (sol kenar) -->
  <rect x="2" y="6" width="8" height="12" fill="#000000" rx="1"/>
  <rect x="2" y="18" width="8" height="12" fill="#dc2626"/>
  <rect x="2" y="30" width="8" height="12" fill="#fbbf24" rx="0 0 1 1"/>
  <!-- Arrow (apply = ileri hareket) -->
  <path d="M14 24 L24 18 L24 22 L34 22 L34 26 L24 26 L24 30 Z" fill="url(#atgBadge)"/>
  <!-- Wordmark -->
  <text x="42" y="32" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a" letter-spacing="-0.5">Apply<tspan fill="#64748b" font-weight="500">To</tspan><tspan fill="#dc2626">German</tspan></text>
</svg>
