    City:
      type: object
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        name_tr: { type: string, nullable: true }
        state_id: { type: integer }
    State:
      type: object
      properties:
        id: { type: integer }
        slug: { type: string }
        name_de: { type: string }
        name_tr: { type: string, nullable: true }
    FieldOfStudy:
      type: object
      properties:
        id: { type: integer }
        slug: { type: string }
        name_tr: { type: string, nullable: true }
        name_de: { type: string }
        name_en: { type: string, nullable: true }
        icon: { type: string, nullable: true }
        color: { type: string, nullable: true }
        programs_count: { type: integer, nullable: true }
    Profession:
