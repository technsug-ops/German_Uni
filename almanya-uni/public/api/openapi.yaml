        id: { type: integer }
        slug: { type: string }
        name_de: { type: string }
        name_en: { type: string, nullable: true }
        name_tr: { type: string, nullable: true }
        degree: { type: string, nullable: true }
        degree_specification: { type: string, nullable: true }
        language: { type: string, nullable: true }
        languages: { type: array, items: { type: string } }
        duration_semesters: { type: integer, nullable: true }
        study_form: { type: string, nullable: true }
        location: { type: string, nullable: true }
        admission_mode: { type: string, nullable: true }
        nc_value: { type: number, nullable: true }
        tuition_fee_eur: { type: number, nullable: true }
        application_deadline_summer: { type: string, format: date, nullable: true }
        application_deadline_winter: { type: string, format: date, nullable: true }
        description_tr: { type: string, nullable: true }
        description_en: { type: string, nullable: true }
        source_url: { type: string, nullable: true }
        university: { $ref: "#/components/schemas/UniversitySummary" }
