        berufenet_id: { type: integer, nullable: true }
        kldb_code: { type: string, nullable: true }
        slug: { type: string }
        name_de: { type: string }
        name_tr: { type: string, nullable: true }
        cluster: { type: string, nullable: true }
        type: { type: string, nullable: true }
