<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — ApplyToGerman</title>
    <link rel="icon" href="/favicon-atg.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0A0A0A; color: #fff; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 1.5rem;
        }
        .wrap { max-width: 380px; }
        .icon {
            width: 88px; height: 88px; margin: 0 auto 1.5rem;
            display: flex; align-items: center; justify-content: center;
        }
        .icon img { width: 88px; height: 88px; border-radius: 20px; }
        h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: .6rem; }
        p { color: #9ca3af; font-size: .95rem; line-height: 1.5; margin-bottom: .35rem; }
        .sub { color: #6b7280; font-size: .8rem; margin-top: .75rem; }
        button {
            margin-top: 1.75rem; padding: .8rem 1.6rem;
            background: #D81E2C; color: #fff; border: 0; border-radius: 12px;
            font-size: .95rem; font-weight: 700; cursor: pointer;
        }
        button:active { opacity: .85; }
        .bar { display: inline-flex; gap: 3px; margin-top: 1.5rem; }
        .bar span { width: 10px; height: 26px; border-radius: 2px; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="icon"><img src="/img/icons/icon-192.png" alt="ApplyToGerman"></div>
        <h1>İnternet bağlantısı yok</h1>
        <p>You are offline. Please check your connection.</p>
        <p class="sub">Bağlantın gelince sayfayı yenile. · Reload when you're back online.</p>
        <button onclick="location.reload()">Tekrar dene · Retry</button>
        <div class="bar">
            <span style="background:#1A1A1A"></span>
            <span style="background:#D81E2C"></span>
            <span style="background:#F4C430"></span>
        </div>
    </div>
</body>
</html>
