name: Deploy to KAS (All-Inkl)

# Tetikleyiciler:
#  - main branch'e push → otomatik deploy
#  - Actions sekmesinden manuel "Run workflow"
on:
  push:
    branches: [main]
  workflow_dispatch:

# Aynı anda iki deploy çalışmasın (push üst üste gelirse en yeniyi bekler)
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ════════════════════════════════════════════════════════════
  # Deploy ÖNCESİ güvenlik ağı — testler geçmezse deploy OLMAZ.
  # Bu oturumda 2 prod-500'ünü (Filament render + form POST) yakalar.
  # ════════════════════════════════════════════════════════════
  test:
    name: Safety-net tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: almanyauni_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s --health-timeout=5s --health-retries=15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, gd, pdo_mysql, bcmath, zip, curl, fileinfo, openssl
          coverage: none
          tools: composer:v2

      - name: Composer install (with dev)
        working-directory: almanya-uni
        run: composer install --optimize-autoloader --no-interaction --no-progress --prefer-dist

      - name: Prepare env + storage dirs
        working-directory: almanya-uni
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/framework/testing bootstrap/cache storage/logs

      - name: Run safety-net tests (MySQL)
        working-directory: almanya-uni
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test tests/Feature/SmokeTest.php tests/Feature/ContactFormTest.php tests/Unit

  build-and-deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # ─────────────────────────────────────────────────────
      # 1. Checkout
      # ─────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────
      # 2. PHP 8.3 + Composer (production deps)
      # ─────────────────────────────────────────────────────
      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, gd, pdo_mysql, bcmath, zip, curl, fileinfo, openssl
          coverage: none
          tools: composer:v2

      - name: Ensure Laravel cache directories exist
        working-directory: almanya-uni
        run: |
          # Laravel 'package:discover' bu klasörlere erişir — git'te boş klasörler kaybolabilir
          mkdir -p bootstrap/cache
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/framework/testing
          mkdir -p storage/logs
          mkdir -p storage/app/public
          chmod -R 775 storage bootstrap/cache

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: almanya-uni/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('almanya-uni/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Composer install (production)
        working-directory: almanya-uni
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress --prefer-dist

      # ─────────────────────────────────────────────────────
      # 3. Node 20 + Vite build
      # ─────────────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: almanya-uni/package-lock.json

      - name: NPM install
        working-directory: almanya-uni
        run: npm ci --no-audit --no-fund

      - name: Vite production build
        working-directory: almanya-uni
        run: npm run build

      # ─────────────────────────────────────────────────────
      # 4. .env.production'ı secret'tan yaz (deploy-time injection)
      # ─────────────────────────────────────────────────────
      - name: Write .env from secret
        working-directory: almanya-uni
        run: |
          # GitHub Secret içeriği aynen yazılır (multiline destekli)
          printf '%s' "${{ secrets.ENV_PRODUCTION }}" > .env
          # Sanity check: .env'in MySQL kullandığını ve SQLite içermediğini doğrula
          if grep -q '^DB_CONNECTION=sqlite' .env; then
            echo "::error::SECRET ENV_PRODUCTION SQLite içeriyor — MySQL olmalı!"
            exit 1
          fi
          if [ ! -s .env ]; then
            echo "::error::.env boş yazıldı — ENV_PRODUCTION secret tanımlanmamış!"
            exit 1
          fi
          echo ".env yazıldı ($(wc -l < .env) satır)"

      # ─────────────────────────────────────────────────────
      # 5. Deploy artefakt hazırlığı — bilinen hatalar için temizlik
      # ─────────────────────────────────────────────────────
      - name: Clean deploy artifacts (postmortem #6: public/hot, vb.)
        working-directory: almanya-uni
        run: |
          # Vite dev mode artığı — production'da SESSİZ FAIL sebebiyor (postmortem #6)
          rm -f public/hot
          # Eski cache'ler (server path'ler local Windows path'leri içerebilir)
          rm -rf bootstrap/cache/*.php
          rm -rf storage/framework/views/*.php
          rm -rf storage/framework/cache/data/*
          rm -rf storage/framework/sessions/*
          # SQLite test DB (postmortem #3: fallback olmasın)
          rm -f database/database.sqlite
          # Build artefaktları silinmesin — vite manifest gerekli
          ls -la public/build > /dev/null 2>&1 || { echo "::error::public/build yok — vite build başarısız!"; exit 1; }
          echo "Artefakt temizliği tamam"

      # ─────────────────────────────────────────────────────
      # 6. Source kodu TEK ZIP dosyasına paketle
      #    Sebep: KAS FTPS çok sayıda küçük dosyayı sync ederken bağlantıyı
      #    düşürüyor (ECONNRESET ~27-77 MB sonra). Tek dosya = tek session = stabil.
      # ─────────────────────────────────────────────────────
      - name: Package source code into single ZIP
        working-directory: almanya-uni
        run: |
          # Bu dosyaları zip'e dahil etme (hariç tutulanlar)
          # Vendor dışlandı — KAS'ta önceki deploy'dan zaten var
          zip -r -q ../deploy-bundle.zip . \
            -x "vendor/*" \
               "node_modules/*" \
               ".git/*" \
               "tests/*" \
               "storage/logs/*" \
               "storage/app/db-dumps/*" \
               "storage/framework/cache/data/*" \
               "storage/framework/sessions/*" \
               "storage/framework/views/*" \
               "deploy/_archive/*" \
               "deploy/*.sql" \
               "deploy/*.sql.gz" \
               "deploy/setup.php" \
               "deploy/blog-fix-publish.php" \
               "deploy/SETUP_TOKEN.txt" \
               ".editorconfig" \
               ".gitignore" \
               ".gitattributes" \
               ".npmrc" \
               "phpunit.xml" \
               ".env.example" \
               ".env.local" \
               "DEPLOY-GUIDE.md" \
               "PARTNER_REQUEST_*.md" \
               "ADMISSION_MODE_NASIL_DOLDURULUR.md" \
               "DAAD_SCHOLARSHIPS_OZET.md" \
               "README.md"
          ls -lh ../deploy-bundle.zip
          echo "Bundle hazır: $(du -h ../deploy-bundle.zip | cut -f1)"

      # ─────────────────────────────────────────────────────
      # 7. Bundle ZIP + extract-tetikleyici dosyayı tek session'da gönder
      # ─────────────────────────────────────────────────────
      - name: Prepare upload directory
        run: |
          mkdir -p ./upload-staging
          mv deploy-bundle.zip ./upload-staging/
          # Pulse dosyası: post-deploy.php görünce extract + cache rebuild yapar
          date -u +"%Y-%m-%dT%H:%M:%SZ" > ./upload-staging/.deploy-pulse
          ls -lh ./upload-staging/

      # SamKirkland action — workflow-level retry için 3 deneme
      # (Curl yaklaşımı 14 ardışık fail aldı, SamKirkland #114'te başarılıydı.
      #  Şimdi action'a dönüp WORKFLOW-level retry ekliyoruz: 3 deneme arasında
      #  20s bekle. Önceki ECONNRESET tek-vuruşluk transient'lerse retry çözer.)
      - name: Upload bundle via FTPS (attempt 1)
        id: ftp1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftps
          port: 21
          local-dir: ./upload-staging/
          server-dir: /almanya-uni/storage/app/
          state-name: .ftp-deploy-bundle-state.json
          log-level: standard
          dangerous-clean-slate: false

      - name: Wait before retry (if attempt 1 failed)
        if: steps.ftp1.outcome == 'failure'
        run: sleep 20

      - name: Upload bundle via FTPS (attempt 2)
        id: ftp2
        if: steps.ftp1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftps
          port: 21
          local-dir: ./upload-staging/
          server-dir: /almanya-uni/storage/app/
          state-name: .ftp-deploy-bundle-state.json
          log-level: standard
          dangerous-clean-slate: false

      - name: Wait before final retry (if attempt 2 failed)
        if: steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure'
        run: sleep 30

      - name: Upload bundle via FTPS (attempt 3 — final)
        if: steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftps
          port: 21
          local-dir: ./upload-staging/
          server-dir: /almanya-uni/storage/app/
          state-name: .ftp-deploy-bundle-state.json
          log-level: standard
          dangerous-clean-slate: false

      # ─────────────────────────────────────────────────────
      # 8. Auto-trigger: server'da _deploy.php'yi çağır
      #    → ZIP extract + cache rebuild OTOMATIK
      #    Pulse-gated: saldırgan pulse oluşturamaz (FTP/SSH gerek)
      # ─────────────────────────────────────────────────────
      - name: Trigger server-side deploy (extract + cache rebuild)
        run: |
          # HTTPS GET → server pulse'u görür → extract + cache rebuild
          # Retry mantığı: 3 deneme, başarısız olursa workflow fail eder
          set -e
          MAX_TRIES=3
          for i in $(seq 1 $MAX_TRIES); do
            echo "Attempt $i/$MAX_TRIES — calling deploy webhook..."
            HTTP_CODE=$(curl -sS -o /tmp/deploy-response.txt -w "%{http_code}" \
              --max-time 120 \
              "https://applytogerman.com/_deploy.php")
            RESPONSE=$(cat /tmp/deploy-response.txt)
            echo "Response: HTTP $HTTP_CODE — $RESPONSE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Deploy webhook successful"
              exit 0
            elif [ "$HTTP_CODE" = "204" ]; then
              echo "⚠️  No pulse found on server (FTP upload may not have completed)"
              sleep 10
            elif [ "$HTTP_CODE" = "429" ]; then
              echo "⚠️  Rate limited, waiting 30s..."
              sleep 30
            else
              echo "❌ Webhook failed with HTTP $HTTP_CODE"
              sleep 15
            fi
          done
          echo "::error::Deploy webhook failed after $MAX_TRIES attempts"
          exit 1

      # ─────────────────────────────────────────────────────
      # 9. Bilgilendirme
      # ─────────────────────────────────────────────────────
      - name: Deploy summary
        if: always()
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Doğrulama:**" >> $GITHUB_STEP_SUMMARY
          echo "- https://almanyauni.com (TR-first primary)" >> $GITHUB_STEP_SUMMARY
          echo "- https://applytogerman.com (intl)" >> $GITHUB_STEP_SUMMARY
